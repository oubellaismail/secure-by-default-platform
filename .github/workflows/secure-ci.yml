# Secure CI pipeline — the first load-bearing checkpoint.
# Nothing gets built and pushed without passing scans and being signed.
#
# Gate order (fail-fast, shift-left): secrets -> SAST -> SCA -> IaC -> build
#   -> image scan -> SBOM -> sign (keyless) -> attest.
#
# Status: scaffold. Wire secrets/registry in Week 2-3; steps are ready to enable.

name: secure-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write        # required for cosign keyless (OIDC) signing

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/sbdp-sample-app
  REGISTRY: ghcr.io

jobs:
  # ---- Gate 1: source-level scanning (fail before we ever build) -----------
  code-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Gitleaks needs full history

      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default

      - name: SCA (Trivy filesystem — dependencies)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: IaC scan (Trivy config — manifests, terraform)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          severity: CRITICAL,HIGH
          exit-code: '1'

  # ---- Gate 2: build, scan image, SBOM, sign, attest -----------------------
  build-sign:
    needs: code-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (by digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./sample-app
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Image vulnerability scan (Trivy) — block on CRITICAL/HIGH
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (Syft, SPDX)
        run: syft "${IMAGE}:${GITHUB_SHA}" -o spdx-json=sbom.spdx.json

      - name: Sign image (cosign keyless / OIDC)
        run: cosign sign --yes "${IMAGE}:${GITHUB_SHA}"

      - name: Attest SBOM as provenance
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE}:${GITHUB_SHA}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
