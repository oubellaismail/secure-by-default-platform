# SCA at the dependency source — Dependabot keeps deps patched (control row 3).
version: 2
updates:
  - package-ecosystem: pip
    directory: /sample-app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /sample-app
    schedule:
      interval: weekly
